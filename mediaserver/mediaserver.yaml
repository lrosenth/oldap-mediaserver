openapi: 3.0.3
info:
  title: OLDAP Media Server API
  version: 0.2.0
  description: OpenAPI definition generated from routes in mediaserver/app.py.
servers:
  - url: http://localhost:8000
security:
  - bearerAuth: []
paths:
  /upload:
    post:
      summary: Upload and register a media asset
      description: |
        Uploads a file, generates a derived asset based on media type/target format,
        stores files on disk, and creates a MediaObject in OLDAP.
        Documents are currently PDF-only. A PDF document is stored unchanged as
        the original file, copied to `derived/document.pdf` for HTTP delivery,
        and rendered from its first page as 128px and 256px JPEG thumbnails.
      tags:
        - upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - projectId
              properties:
                file:
                  type: string
                  format: binary
                resourceClass:
                  type: string
                  default: shared:MediaObject
                projectId:
                  type: string
                path:
                  type: string
                  description: Relative subpath under the project/media-type root.
                identifier:
                  type: string
                  description: |
                    Asset identifier. If omitted, the server generates one. Explicit
                    identifiers must contain 1-128 URL-safe characters
                    (`A-Z`, `a-z`, `0-9`, `.`, `_`, `~`, `-`) and must not already exist.
                targetFormat:
                  type: string
                  description: |
                    Desired output format. Allowed values depend on detected media type.
                    image: tiff, video: mp4, audio: mp3|m4a, document: pdf.
                    TIFF is the default and only image target; it produces a
                    pyramidal tiled `derived/master.tif` IIIF source.
                    For audio, mp3 is the default browser-delivery derivative.
                    For documents, pdf is the only accepted value and produces
                    the stable derivative filename `document.pdf`.
                attachedToRole:
                  type: array
                  items:
                    type: string
                  description: One or more role identifiers.
            encoding:
              attachedToRole:
                style: form
                explode: true
      responses:
        '200':
          description: Upload and registration succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSuccess'
        '400':
          description: Validation or request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageError'
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageError'
        '404':
          description: Project/resource lookup failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageError'
        '409':
          description: The requested asset identifier already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageError'
        '500':
          description: Internal/upstream failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /upload/{asset_id}:
    delete:
      summary: Delete an asset and its media files
      tags:
        - upload
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Deleted asset abc123
        '400':
          description: Invalid graph information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: OLDAP/network/server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /auth/asset/{asset_id}:
    get:
      summary: Resolve derived asset path for Caddy auth_request
      description: |
        Returns status 204 and sets headers with internal path metadata for HTTP assets.
        IIIF assets are only resolved here when the requested variant is `original`;
        derived IIIF delivery remains the responsibility of the IIIF image server.
        Optional JWT query token can be supplied via `token`.
        An optional `derivative` query parameter can be used to request a specific file from the
        `derived/` directory instead of the default derivative recorded in OLDAP.
      tags:
        - auth
      security: []
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: Optional HS256 JWT.
        - name: derivative
          in: query
          required: false
          schema:
            type: string
          description: Optional derived filename to resolve instead of the default derivativeName stored in OLDAP (for example `thumb128.jpg` or `thumb256.jpg`). Only valid for derived assets.
        - name: download
          in: query
          required: false
          schema:
            type: string
            enum: ['1']
          description: When set to `1`, emits an attachment Content-Disposition for original downloads.
      responses:
        '204':
          description: Asset authorized and resolved
          headers:
            X-OLDAP-Internal-Path:
              schema:
                type: string
            X-OLDAP-Content-Type:
              schema:
                type: string
            X-OLDAP-Content-Disposition:
              schema:
                type: string
            X-OLDAP-Cors-Allow-Origin:
              schema:
                type: string
        '403':
          description: Forbidden (e.g., invalid protocol/path)
        '404':
          description: Asset or file not found
        '502':
          description: Upstream OLDAP API error

  /auth/asset/{asset_id}/{which}:
    get:
      summary: Resolve asset path for selected variant
      description: Same as `/auth/asset/{asset_id}` but explicit variant selection. When `which=derived`, an optional `derivative` query parameter can be used to request a specific file from the `derived/` directory. For IIIF assets, only `which=original` is valid on this endpoint.
      tags:
        - auth
      security: []
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
        - name: which
          in: path
          required: true
          schema:
            type: string
            enum: [derived, original]
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: Optional HS256 JWT.
        - name: derivative
          in: query
          required: false
          schema:
            type: string
          description: Optional derived filename to resolve instead of the default derivativeName stored in OLDAP (for example `thumb128.jpg` or `thumb256.jpg`). Only used when `which=derived`.
        - name: download
          in: query
          required: false
          schema:
            type: string
            enum: ['1']
          description: When set to `1`, emits an attachment Content-Disposition for original downloads.
      responses:
        '204':
          description: Asset authorized and resolved
          headers:
            X-OLDAP-Internal-Path:
              schema:
                type: string
            X-OLDAP-Content-Type:
              schema:
                type: string
            X-OLDAP-Content-Disposition:
              schema:
                type: string
            X-OLDAP-Cors-Allow-Origin:
              schema:
                type: string
        '404':
          description: Invalid variant or file not found
        '403':
          description: Forbidden
        '502':
          description: Upstream OLDAP API error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UploadSuccess:
      type: object
      properties:
        identifier:
          type: string
        assetId:
          type: string
        imageId:
          type: string
        iri:
          type: string
        originalName:
          type: string
        originalMimeType:
          type: string
          description: MIME type recorded on the MediaObject. PDF document uploads are normalized to application/pdf.
        derivativeName:
          type: string
          description: Filename inside the asset's derived directory, e.g. master.tif, web.mp4, web.mp3, or document.pdf.
        mediaType:
          type: string
          enum: [image, audio, video, document, other]
        dctermsType:
          type: string
          description: DCMI Type QName written to the MediaObject, e.g. dcmitype:Text for PDF documents.
        protocol:
          type: string
          enum: [iiif, http, custom]
          description: Delivery protocol written to the MediaObject. PDF documents use http.
        iiifInfoUrl:
          type: string
          description: IIIF info URL for image clients. Non-image clients should use assetUrl.
        assetUrl:
          type: string
          description: HTTP asset URL for Caddy-served audio, video, and PDF documents.
        storedPath:
          type: string
        thumb128Name:
          type: string
          nullable: true
          description: Filename of the square 128px thumbnail for video and PDF uploads.
        thumb256Name:
          type: string
          nullable: true
          description: Filename of the square 256px thumbnail for video and PDF uploads.
        thumb128Url:
          type: string
          nullable: true
          description: URL to access the 128px video or first-page PDF thumbnail via the /asset endpoint.
        thumb256Url:
          type: string
          nullable: true
          description: URL to access the 256px video or first-page PDF thumbnail via the /asset endpoint.
      required:
        - identifier
        - assetId
        - imageId
        - iri
        - originalName
        - originalMimeType
        - derivativeName
        - mediaType
        - dctermsType
        - protocol
        - iiifInfoUrl
        - assetUrl
        - storedPath

    MessageError:
      type: object
      properties:
        message:
          type: string

    ErrorMessage:
      type: object
      properties:
        error:
          type: string
