---
- name: Deploy OLDAP media stack
  hosts: "{{ target_hosts | default('mediaserver') }}"
  become: true

  pre_tasks:
    - name: Validate explicit component deployment tags
      ansible.builtin.assert:
        that:
          - (oldap_imageserver_tag | default('') | string | trim | length) > 0
          - (oldap_mediahelper_tag | default('') | string | trim | length) > 0
        fail_msg: >-
          Supply oldap_imageserver_tag and oldap_mediahelper_tag explicitly.
          The repository-root Makefile derives them from the component VERSION
          files for normal deployments.

    - name: Load ignored or Vault-backed authentication secrets
      ansible.builtin.include_vars:
        file: "{{ auth_secrets_file | default(playbook_dir ~ '/auth-secrets.yml') }}"
      when: >-
        oldap_access_jwt_secret is not defined or
        oldap_media_jwt_secret is not defined
      no_log: true

    - name: Validate OLDAP access and media token secrets
      ansible.builtin.assert:
        that:
          - (oldap_access_jwt_secret | default('') | string | length) >= 32
          - (oldap_media_jwt_secret | default('') | string | length) >= 32
          - (oldap_access_jwt_secret | default('')) != (oldap_media_jwt_secret | default(''))
        fail_msg: >-
          Supply distinct OLDAP access and media JWT secrets of at least 32
          bytes through auth-secrets.yml or Ansible Vault.
      no_log: true

  tasks:
    - name: Optionally allow HTTP/HTTPS with UFW
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"
      when: manage_ufw | bool

    - name: Remove outdated Docker apt source file if present
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent

    - name: Install apt prerequisites for Docker
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Configure Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker engine and compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Create deployment and data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ deploy_root }}"
        - "{{ compose_dir }}"
        - "{{ caddy_data_dir }}"
        - "{{ caddy_config_dir }}"
        - "{{ media_root }}"
        - "{{ media_root }}/cache"

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: "{{ compose_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0644"

    - name: Render Caddyfile
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: "{{ compose_dir }}/Caddyfile"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload Caddyfile
        - Restart Caddy container

    - name: Render mediaserver.env
      ansible.builtin.template:
        src: templates/mediaserver.env.j2
        dest: "{{ compose_dir }}/mediaserver.env"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Render mediahelper access-token environment
      ansible.builtin.template:
        src: templates/mediahelper-access.env.j2
        dest: "{{ compose_dir }}/mediahelper-access.env"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Validate rendered Docker Compose configuration
      ansible.builtin.command:
        cmd: docker compose config --quiet
        chdir: "{{ compose_dir }}"
      changed_when: false
      no_log: true

    - name: Roll back stack
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: absent
      when: rollback | bool

    - name: Deploy stack
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: present
        pull: "{{ 'always' if force_pull | bool else 'missing' }}"
        remove_orphans: true
        wait: true
        wait_timeout: 120
      when: not rollback | bool

    - name: Apply pending Caddy configuration before health verification
      ansible.builtin.meta: flush_handlers
      when: not rollback | bool

    - name: Show resulting compose services
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: present
      register: compose_result
      changed_when: false
      when: not rollback | bool

    - name: Print compose status
      ansible.builtin.debug:
        var: compose_result
      when: not rollback | bool

    - name: Verify the deployed mediahelper through the public endpoint
      ansible.builtin.uri:
        url: "https://{{ media_domain }}/health"
        method: GET
        return_content: true
        status_code: 200
        timeout: 10
        validate_certs: "{{ not (caddy_tls_internal | default(false) | bool) }}"
      register: media_health
      until:
        - media_health.status == 200
        - (media_health.json.status | default('')) == 'ok'
        - (media_health.json.service | default('')) == 'oldap-mediahelper'
        - >-
          (media_health.json.version | default('') | regex_replace('^v', '')) ==
          (oldap_mediahelper_tag | regex_replace('^v', ''))
      retries: 24
      delay: 5
      when: not rollback | bool

    - name: Verify the public IIIF authorization path
      ansible.builtin.uri:
        url: "https://{{ media_domain }}/iiif/3/__oldap_deployment_probe__/info.json"
        method: GET
        status_code: 401
        timeout: 10
        validate_certs: "{{ not (caddy_tls_internal | default(false) | bool) }}"
      register: iiif_auth_probe
      until: iiif_auth_probe.status == 401
      retries: 24
      delay: 5
      when: not rollback | bool

  handlers:
    - name: Reload Caddyfile
      ansible.builtin.command:
        cmd: docker exec oldap-media-caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
      changed_when: true
      failed_when: false
      when: not rollback | bool

    - name: Restart Caddy container
      ansible.builtin.command:
        cmd: docker restart oldap-media-caddy
      changed_when: true
      when: not rollback | bool
