# Deployment target
media_domain: media.oldap.org
oldap_api_url: https://api.oldap.org

# Image tags. The imageserver tag is supplied explicitly by the repository-root
# Makefile so build and deployment use imageserver/VERSION as their shared source.
oldap_mediahelper_tag: v0.0.14
caddy_image_tag: 2.8

# Runtime behavior
app_env: Prod
force_pull: false
rollback: false

# Host filesystem layout
media_root: /data/media
deploy_root: /opt/oldap-mediaserver
compose_dir: "{{ deploy_root }}/compose"
caddy_data_dir: "{{ deploy_root }}/caddy-data"
caddy_config_dir: "{{ deploy_root }}/caddy-config"

# Flask / OLDAP integration. Secrets are supplied through an ignored vars file
# or Ansible Vault and are deliberately absent from tracked group vars.
oldap_jwt_issuer: https://oldap.org
oldap_jwt_audience: oldap-api
oldap_unknown_userid: unknown
oldap_unknown_password: ""
cors_origins: "*"

# Optional ACME contact address for Caddy (recommended)
caddy_acme_email: ""

# Optional firewall management via UFW
manage_ufw: false

# Docker apt repo architecture
# amd64 for x86_64 VMs; change if needed.
docker_apt_arch: amd64
