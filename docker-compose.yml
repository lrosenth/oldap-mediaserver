services:
  # Flask upload + auth resolver (your app.py)
  mediaserver:
    image: lrosenth/oldap-mediahelper:${OLDAP_MEDIAHELPER_TAG:-latest}
    container_name: oldap-mediahelper
    env_file:
      - ./mediaserver.env
    environment:
      - IIIF_BASE_URL=${IIIF_BASE_URL:-http://localhost:8088/iiif/3/}
      - MEDIA_BASE_URL=${MEDIA_BASE_URL:-http://localhost:8088/}
      - APP_ENV=${APP_ENV:-Dev}

    volumes:
      - ${MEDIA_DATA_HOST:-./data}:/data/images
    expose:
      - "8000"
    # Needed on Linux so host.docker.internal works
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command:
      ["gunicorn",
       "-b", "0.0.0.0:8000",
       "--workers", "${GUNICORN_WORKERS:-1}",
       "--worker-class", "gthread",
       "--threads", "${GUNICORN_THREADS:-4}",
       "--timeout", "${GUNICORN_TIMEOUT:-300}",
       "--graceful-timeout", "${GUNICORN_GRACEFUL_TIMEOUT:-60}",
       "--keep-alive", "${GUNICORN_KEEPALIVE:-5}",
       "--access-logfile", "-",
       "--error-logfile", "-",
       "--log-level", "${GUNICORN_LOG_LEVEL:-info}",
       "app:app"]

  # IIIF image server (your custom Kakadu-based image)
  imageserver:
    image: lrosenth/oldap-imageserver:${OLDAP_IMAGESERVER_TAG:-latest}
    container_name: oldap-imageserver
    env_file:
      - ./mediaserver.env
    volumes:
      - ${MEDIA_DATA_HOST:-./data}:/data/images
    expose:
      - "8182"
    # Needed on Linux so host.docker.internal works
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Caddy reverse proxy + static bitstream serving
  caddy:
    image: caddy:2.8
    container_name: oldap-media-caddy
    ports:
      - "${CADDY_PORT:-8088}:8088"    # local dev entrypoint (http://localhost:8088)
      # - "8443:443"     # optional local TLS testing
      # On the VM you will usually map 80:80 and 443:443 instead
    environment:
      CADDY_MODE: ${CADDY_MODE:-dev}
      CADDY_PORT: ${CADDY_PORT:-8088}
      # For dev set SITE_ADDRESS=http://localhost to disable auto-https redirects.
      # For prod set SITE_ADDRESS=media.oldap.org to enable HTTPS.
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${MEDIA_DATA_HOST:-./data}:/data/images:ro
      - ${CADDY_DATA:-./caddy-data}:/data
      - ${CADDY_CONF:-./caddy-conf}:/config
    depends_on:
      - mediaserver
      - imageserver
    restart: unless-stopped
