

# Ansible inventory for OLDAP mediaserver
# ------------------------------------------------------------
# Naming conventions:
#   - Ansible vars: lower_snake_case
#   - Container env: UPPER_SNAKE_CASE (rendered via mediaserver.env.j2)
#
# Minimal required vars (set per host or per group):
#   oldap_jwt_secret, oldap_jwt_iss, public_api_url,
#   cors_origins, oldap_unknown_userid, oldap_unknown_password, oldap_data
#
# Derived vars (recommended; can be overridden):
#   media_data_dir, uploader_imgdir

[mediaserver]
# Example prod host (adjust hostname/IP and user)
# dhlab-oldap.dhlab.unibas.ch ansible_user=ubuntu

# Example test/stage host
# dhlab-oldap-test.dhlab.unibas.ch ansible_user=ubuntu


[mediaserver:vars]
# --- Core paths (host-specific)
# Base directory on the host where all media-related data lives.
# Typical: /srv/oldap or /opt/oldap or /data/oldap
oldap_data=/data/oldap

# Data directories (host paths)
# ------------------------------------------------------------
# In your current setup the uploader writes into the same tree that the
# imageserver serves from. Therefore we keep BOTH variables, but default
# them to the SAME host directory. If later you want to separate masters/
# derivatives, you can simply change media_data_dir to a different path.
#
# IMPORTANT: Ansible inventory.ini does NOT expand ${oldap_data}. Use
# explicit paths here; derivation happens in the env-template (Jinja).
media_data_dir=/data/oldap
uploader_imgdir=/data/oldap

# --- JWT / Auth (secrets)
# IMPORTANT: Use a strong secret (>= 32 bytes). Consider moving to ansible-vault later.
oldap_jwt_secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET
oldap_jwt_iss=http://oldap.org

# --- API (public/external URL that clients should use)
# This is the URL the mediahelper uses to talk to oldap-api (or to validate/lookup).
public_api_url=https://api.oldap.org

# --- Anonymous/fallback user
oldap_unknown_userid=unknown
# Always define this (even if empty) to avoid “undefined vs empty” surprises.
oldap_unknown_password=

# --- CORS
# Either "*" or a comma-separated list of origins.
cors_origins=*


